<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - I SUPPORT Hon. ATIKU</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Admin Dashboard</h1>
<p>Hon. ATIKU Supporters - Keffi West</p>
</header>


<main>

<h2>Ward Statistics</h2>

<ul>
<li>Tudun Kofa Ward: <span id="tudunKofa">0</span></li>
<li>Gangaren Tudu Ward: <span id="gangarenTudu">0</span></li>
<li>Yara Ward: <span id="yara">0</span></li>
<li>Iya 1 Ward: <span id="iya1">0</span></li>
<li>Iya 2 Ward: <span id="iya2">0</span></li>
</ul>


<h2>Registered Supporters</h2>

<input 
id="searchInput" 
type="text" 
placeholder="Search by Name, Phone or Ward">


<br><br>


<button id="exportBtn">
Export to CSV
</button>


<br><br>


<table border="1" width="100%" cellspacing="0" cellpadding="8">

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Ward</th>
<th>Polling Unit</th>
<th>Gender</th>
<th>Occupation</th>
</tr>
</thead>


<tbody id="supportersTable"></tbody>


</table>


</main>



<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyBFqueiUkNm4-h3m0ZnSDE1kn1ThXa_ylc",

authDomain: "atiku-support.firebaseapp.com",

projectId: "atiku-support",

storageBucket: "atiku-support.firebasestorage.app",

messagingSenderId: "871116443693",

appId: "1:871116443693:web:4c9758622c44ada0b068a4"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



// Load supporters

async function loadSupporters(search="") {


const table = document.getElementById("supportersTable");

table.innerHTML = "";



const snapshot = await getDocs(collection(db,"supporters"));



snapshot.forEach((doc)=>{


const data = doc.data();



const text =

((data.name || "") +

(data.phone || "") +

(data.ward || "")).toLowerCase();



if(!text.includes(search.toLowerCase())) return;



table.innerHTML += `

<tr>

<td>${data.name || ""}</td>

<td>${data.phone || ""}</td>

<td>${data.ward || ""}</td>

<td>${data.pollingUnit || ""}</td>

<td>${data.gender || ""}</td>

<td>${data.occupation || ""}</td>

</tr>

`;

});


}



loadSupporters();



// Search

document.getElementById("searchInput")
.addEventListener("keyup",(e)=>{

loadSupporters(e.target.value);

});




// Export CSV

document.getElementById("exportBtn")
.addEventListener("click",async()=>{


const snapshot = await getDocs(collection(db,"supporters"));



let csv = 
"Name,Phone,Ward,Polling Unit,Gender,Occupation\n";



snapshot.forEach((doc)=>{


const data = doc.data();



csv +=

`"${data.name || ""}","${data.phone || ""}","${data.ward || ""}","${data.pollingUnit || ""}","${data.gender || ""}","${data.occupation || ""}"\n`;



});



const blob = new Blob(
[csv],
{type:"text/csv;charset=utf-8;"}
);



const url = URL.createObjectURL(blob);



const link = document.createElement("a");

link.style.display = "none";

link.href = url;

link.download = "KeffiWestSupporters.csv";



document.body.appendChild(link);


link.click();

<script type="module" src="admin.js"></script>
</body>
</html>
</table>

</main>

<script type="module" src="admin.js"></script>

</body>
</html>
